version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fitex-api:latest
    container_name: fitex-api
    restart: unless-stopped
    env_file: .env
    environment:
      # Папка с Apple .cer смонтирована ниже; без неё падает разбор JWS в POST /webhooks/apple
      APPLE_ROOT_CA_DIR: /app/certs
    volumes:
      # Сертификаты лежат на хосте в ./certs рядом с compose — внутри контейнера видны как /app/certs
      - ./certs:/app/certs:ro
    ports:
      - "0.0.0.0:3000:3000"      # open to world — no domain needed, access via http://IP:3000
    networks:
      - fitex-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  fitex-net:
    driver: bridge
