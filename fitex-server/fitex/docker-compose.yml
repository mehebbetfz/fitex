version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fitex-api:latest
    container_name: fitex-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"    # expose only to localhost — nginx proxies externally
    networks:
      - fitex-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  fitex-net:
    driver: bridge
