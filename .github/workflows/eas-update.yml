name: ⚡ EAS Update (OTA — Over-The-Air)

# OTA обновления работают БЕЗ публикации в магазины.
# Пользователи получают обновление при следующем запуске приложения.
# Ограничение: только изменения JS/TS/Assets — нативный код требует полного билда.

on:
  push:
    branches: [main]
    paths:
      - "fitex-mobile/**"
      - "!fitex-mobile/fitex/eas.json"           # изменения конфига не тригерят OTA
      - "!fitex-mobile/fitex/app.json"
      - "!fitex-mobile/fitex/package.json"        # изменения deps = нативный код → нужен билд
      - "!fitex-mobile/fitex/package-lock.json"

  workflow_dispatch:
    inputs:
      message:
        description: "Update message (shown in Expo dashboard)"
        required: false
        default: "Manual OTA update"

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: fitex-mobile/fitex/package-lock.json

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: fitex-mobile/fitex
        run: npm ci

      - name: Determine update message
        id: msg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "message=${{ inputs.message }}" >> $GITHUB_OUTPUT
          else
            echo "message=${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish OTA update → production channel
        working-directory: fitex-mobile/fitex
        run: |
          eas update \
            --channel production \
            --message "${{ steps.msg.outputs.message }}" \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Summary
        run: |
          echo "## ⚡ OTA Update Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** production" >> $GITHUB_STEP_SUMMARY
          echo "**Message:** ${{ steps.msg.outputs.message }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Users will receive this update on next app launch." >> $GITHUB_STEP_SUMMARY
